<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield outer -->
  <path d="M64 8 L112 28 L112 60 Q112 96 64 120 Q16 96 16 60 L16 28 Z" 
        fill="url(#shield-grad)" stroke="#60a5fa" stroke-width="2.5"/>
  
  <!-- Shield inner border -->
  <path d="M64 18 L104 34 L104 58 Q104 90 64 112 Q24 90 24 58 L24 34 Z" 
        fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Badge circle -->
  <circle cx="64" cy="62" r="24" fill="url(#badge-grad)" stroke="#d97706" stroke-width="2"/>
  
  <!-- Star in badge -->
  <polygon points="64,44 68,56 82,56 71,64 75,78 64,70 53,78 57,64 46,56 60,56" 
           fill="#1e40af" stroke="#1e3a8a" stroke-width="0.8"/>
  
  <!-- Letter P -->
  <text x="64" y="104" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="14" font-weight="900" fill="#93c5fd" letter-spacing="1">
    PRAHARI
  </text>
</svg>
